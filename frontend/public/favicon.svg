<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fundo azul escuro (#000080) -->
  <rect width="512" height="512" rx="80" ry="80" fill="#000080"/>
  
  <!-- Linha de batimento cardíaco / ECG -->
  <polyline 
    points="60,256 140,256 180,180 220,332 260,120 300,256 340,256 380,256 452,256"
    fill="none"
    stroke="#ffffff"
    stroke-width="24"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  
  <!-- Círculo de delimitação sutil para destaque -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#0000FF" stroke-width="8" opacity="0.3"/>
</svg>